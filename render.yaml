services:
  - type: web
    name: items7-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MONGODB_URI
        scope: build,runtime
      - key: STRIPE_SECRET_KEY
        scope: build,runtime
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        scope: build,runtime
